# Piper 真机：仅 Pi0.5 策略推理（不写 demos / 不启用 lerobot 导出）。
# 与 async 训练一致：RealWorldEnv.chunk_step + prepare_actions + predict_action_batch。
#
# 注意：不能 defaults 到 realworld_piper_collect_policy，因为该文件含 hydra.searchpath；
# Hydra 只允许在「主配置」（本文件）里设置 searchpath。
#
# 用法：
#   export REPO_PATH=/data/cyy/RLinf
#   bash examples/embodiment/infer_realworld_piper_pi05.sh
#
# 覆盖 SFT 目录与任务语言：
#   bash examples/embodiment/infer_realworld_piper_pi05.sh \
#     actor.model.model_path=/path/to/your/pi05_sft \
#     runner.default_task_prompt="你的任务描述"
#
# Piper 真机推荐 ``pi05_piper``（与 pi05_libero 权重/资产一致，但数据变换参数可在 YAML 里配）。
# 若仍用 libero 数据配置名：
#   actor.model.openpi.config_name=pi05_libero
# 可调参数见 ``LeRobotPiperDataConfig``，经 ``actor.openpi_data`` 覆盖，例如：
#   actor.openpi_data.override_use_quantile_norm=true
#   actor.openpi_data.env_action_dim=7
#
# 下方 cluster 与 realworld_piper_pi05_5090.yaml 一致（5090d + Piper），覆盖 collect_data_base 的 piper_robot。
# 若需 piper_robot 节点组，删除本文件的 cluster 块或整段命令行覆盖为 collect_data_base 中的 cluster。

defaults:
  - realworld_piper_collect_data_base
  - model/pi0_5@actor.model
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env:
      node_group: "5090d"
      placement: 0
  node_groups:
    - label: "5090d"
      node_ranks: 0
      hardware:
        type: Piper
        configs:
          # Single arm: "can0"
          # Dual arm: "can0,can1" (left,right)
          - can_name: "can0,can1"
            node_rank: 0

runner:
  use_policy_inference: true
  policy_predict_mode: eval
  ckpt_path: null
  default_task_prompt: "unscrew the bottle cap"
  save_demos: true
  num_data_episodes: 100
  experiment_name: "piper-pi05-infer"
  # 每次策略推理前保存 main + 两路 wrist 对应 PNG（默认目录见下；可设绝对路径）
  save_inference_images: false
  inference_images_dir: /data/cyy/RLinf/logs/inference_vis

env:
  data_collection:
    enabled: false
  eval:
    env_type: realworld
    # Match Pi05 SFT stats/input shape: 7 dims = joint_position(6) + gripper_position(1)
    state_keys: ["joint_position", "gripper_position"]
    # 必须写在 override_cfg 里才会传给 PiperRobotConfig；仅 env.eval 顶层无效。
    override_cfg:
      enable_camera_player: false

actor:
  group_name: ActorGroup
  # openpi_data 会 merge 进 LeRobotPiperDataConfig（见 rlinf/.../piper_dataconfig.py）
  openpi_data:
    # override_use_quantile_norm: true
    # synthetic_wrist_from_base: true
    env_action_dim: 14
  model:
    model_path: /data/cyy/ckpts/adk111/pi05_unscrew_the_bottle_capv2_5000
    state_dim: 14
    action_dim: 14
    num_action_chunks: 50
    num_q_heads: 10
    openpi:
      config_name: pi05_piper

rollout:
  group_name: RolloutGroup
  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}
