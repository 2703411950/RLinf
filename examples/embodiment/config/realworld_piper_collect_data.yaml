# Piper 真机数据采集（与 Franka 的 realworld_collect_data 对应）
# 用法：
#   bash examples/embodiment/collect_data.sh realworld_piper_collect_data
#
# 多机时：在机械臂所在节点上执行，并设置 cluster.node_groups 与 hardware（can_name、node_rank）。
# 空间鼠标：需系统 libhidapi；若用主从臂、不用 SpaceMouse，将 env.eval.use_spacemouse 设为 False。

defaults:
  - realworld_piper_collect_data_base

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/
