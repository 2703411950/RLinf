# Piper 真机数据采集基座：只放“采集模式”特有配置。
# 共享的机器人/任务常量下沉到 realworld_piper_common_base.yaml。

defaults:
  - realworld_piper_common_base

# Piper 的 CAN 只在「插着 USB-CAN、接了机械臂」的那台机器上存在。
# DataCollector / Env 必须调度到那台机器，PiperController 才会在同一节点创建。
#
# 若你在 192.168.68.43（如 head）上跑脚本，但机械臂在 192.168.68.30（另一 Ray worker），
# 必须把下面 node_ranks / node_rank 改成「机械臂所在机器的 cluster node rank」，并 num_nodes 与 Ray 集群一致。
# 常见：RLINF_NODE_RANK=0 为 head(43)，RLINF_NODE_RANK=1 为 Piper 机(30) → 用 node_ranks: 1 与 node_rank: 1。
#
# 若只在 Piper 本机单机跑（无多节点 Ray）：num_nodes: 1，node_ranks: 0，hardware.configs.node_rank: 0。
cluster:
  num_nodes: 1
  component_placement:
    env:
      node_group: piper_robot
      placement: 0
  node_groups:
    - label: piper_robot
      node_ranks: 0
      hardware:
        type: Piper
        configs:
          - can_name: "can1"
            node_rank: 0

runner:
  num_data_episodes: 10
  experiment_name: "collect-data-piper"
  # false：每结束一条轨迹（done）计 1 条，便于采集探索数据；true：仅成功回合计入 num_data_episodes（与原 Franka peg 行为一致）
  count_success_episodes_only: false
  # 每条轨迹保存后暂停，人工复位台面/工件后按 Enter，再执行 env.reset() 开始下一条。无终端/自动化可设 false 或 export RLINF_COLLECT_SKIP_PAUSE=1
  pause_for_manual_reset: false

env:
  eval:
    override_cfg:
      max_num_steps: 1000
      success_hold_steps: 200       # 可选，避免成功判定太快触发
  data_collection:
    enabled: true
    save_dir: ${runner.logger.log_path}/collected_data
    export_format: "lerobot"
    only_success: false
    robot_type: "piper"
    fps: 30
